<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Maps</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap"
        rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="A simple, fast routing map.">
</head>

<body>

    <!-- Desktop Navigation Bar -->
    <header class="top-nav" id="desktop-nav">
        <div class="nav-left">
            <h1 class="logo">Maps</h1>
            <span class="tagline">Explore and navigate</span>
        </div>
        <div class="nav-right">
            <div class="weather-indicator">⛅ 28°C</div>
            <div class="traffic-status">Traffic: Moderate</div>
        </div>
    </header>


    <!-- Mobile Top Elements -->
    <div class="mobile-search-bar" id="mobile-search">
        <input type="text" placeholder="Search Place" class="search-input">
        <button class="icon-btn" aria-label="Search">🔍</button>
    </div>

    <!-- Top Navigation Banner (Hidden by default) -->
    <div id="nav-banner" class="nav-banner">
        <div class="primary-instruction">
            <div class="nav-icon" id="primary-direction-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m0-16l-4 4m4-4l4 4" />
                </svg>
            </div>
            <div class="nav-text-container">
                <div class="nav-distance" id="nav-distance">--</div>
                <div class="nav-instruction" id="nav-instruction">Head South</div>
            </div>
        </div>
        <div class="secondary-instruction" id="secondary-instruction-box">
            <div class="nav-icon small-icon" id="secondary-direction-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                </svg>
            </div>
            <div class="nav-text-container">
                <div class="nav-secondary-text label">Then</div>
                <div class="nav-secondary-text" id="nav-secondary-text">Turn left</div>
            </div>
        </div>
        <div class="nav-status-label" id="nav-status">En Route</div>
    </div>

    <!-- Bottom Navigation Info Card -->
    <div id="nav-bottom-card" class="nav-bottom-card">
        <div class="nav-eta-box">
            <div class="eta-time" id="nav-eta-time">-- min</div>
            <div class="nav-road-name" id="nav-road-name">Exploring ...</div>
            <div class="eta-stats">
                <span id="nav-eta-distance">-- km</span> •
                <span id="nav-speed">0 km/h</span> •
                <span id="nav-eta-arrival">--:--</span>
            </div>
        </div>
        <button id="stop-nav-btn" class="stop-nav-btn">
            <span style="margin-right: 6px; font-weight: 600;">✖ End</span>
        </button>
    </div>

    <button id="traffic-toggle-btn" class="traffic-toggle-btn">🚥 Traffic: ON</button>
    <button id="risk-toggle-btn" class="risk-toggle-btn">🛡️ Risk View: OFF</button>

    <div class="action-buttons-column">
        <button id="sos-btn" class="sos-btn">🚨 SOS</button>
        <button id="report-hazard-btn" class="report-hazard-btn">📢 Report Hazard</button>
    </div>

    <!-- Hazard Report Modal -->
    <div id="hazard-modal" class="hazard-modal" style="display: none;">
        <div class="modal-content">
            <h3>Report a Hazard</h3>
            <select id="hazard-type" class="search-input">
                <option value="accident">Accident</option>
                <option value="flood">Waterlogging</option>
                <option value="damage">Road Damage</option>
            </select>
            <input type="text" id="hazard-desc" placeholder="Brief description..." class="search-input"
                style="margin-top: 10px;">
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button id="submit-hazard" class="primary-btn" style="flex: 1;">Submit</button>
                <button id="close-hazard-modal" class="vehicle-btn" style="flex: 1;">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Safety Alert Box -->
    <div id="safety-alert-box" class="safety-alert-box">
        <span id="safety-alert-text">⚠ Hazard Ahead</span>
    </div>

    <!-- Navigation Custom Zoom Controls -->
    <div class="nav-zoom-controls" id="nav-zoom-controls" style="display: none;">
        <button id="nav-zoom-in" aria-label="Zoom In">+</button>
        <button id="nav-zoom-out" aria-label="Zoom Out">−</button>
    </div>

    <!-- Map Container -->
    <div id="map"></div>

    <aside class="side-panel" id="side-panel">
        <!-- Inner handle for mobile drag simulation -->
        <div class="mobile-handle" id="mobile-handle"></div>

        <div class="search-section">
            <div class="vehicle-selector">
                <button class="vehicle-btn active" data-vehicle="driving">🚗 Car</button>
                <button class="vehicle-btn" data-vehicle="cycling">🚲 Bike</button>
            </div>
            <input type="text" placeholder="Choose starting point..." class="search-input" id="start-loc">
            <input type="text" placeholder="Choose destination..." class="search-input" id="end-loc">
            <button class="primary-btn" id="check-route-btn">Get Directions</button>
        </div>

        <div class="route-safety-card" id="route-panel" style="display: none;">
            <h3>Multiple Route Options</h3>
            <div id="route-choices-container" class="route-choices-container">
                <!-- Route choices injected dynamically -->
            </div>
            <button class="primary-btn" id="start-nav-btn" style="display: none; margin-top: 15px;">🚀 Start
                Navigation</button>
        </div>
    </aside>

    <button class="locate-btn" id="locate-btn" aria-label="Locate Me">📍 My Location</button>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>

</html>
